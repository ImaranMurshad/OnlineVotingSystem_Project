{% extends 'accounts/voter_base.html' %}

{% block content %}

<h3 class="mb-4">🗳️ Vote in {{ election.title }}</h3>

<div class="card shadow-sm p-4">

    <form method="POST">
        {% csrf_token %}

        {% for candidate in candidates %}
            <div class="form-check mb-3 p-2 border rounded hover-effect">
                <input class="form-check-input" type="radio" 
                       name="candidate" value="{{ candidate.id }}" required>

                <label class="form-check-label fw-bold ms-2">
                    {{ candidate.name }}
                </label>
            </div>
        {% endfor %}

        <button type="submit" class="btn btn-primary mt-3 w-100">
            ✅ Submit Vote
        </button>

    </form>

</div>

<style>
.hover-effect:hover {
    background: #f8f9fa;
    cursor: pointer;
}
</style>

{% endblock %}

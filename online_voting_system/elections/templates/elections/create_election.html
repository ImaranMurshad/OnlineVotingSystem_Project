{% extends 'accounts/host_base.html' %}

{% block content %}

<div class="container">

    <h2 class="mb-4">🗳️ Create Election</h2>

    <div class="card p-4 shadow-sm">

        <form method="POST">
            {% csrf_token %}

            <!-- TITLE -->
            <div class="mb-3">
                <label class="form-label">Election Title</label>
                <input type="text" name="title" class="form-control" placeholder="Enter election title">
            </div>

            <!-- DESCRIPTION -->
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="4" placeholder="Enter description"></textarea>
            </div>

            <!-- DATES -->
            <div class="row">

                <div class="col-md-6 mb-3">
                    <label class="form-label">Start Date</label>
                    <input type="datetime-local" name="start_date" class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">End Date</label>
                    <input type="datetime-local" name="end_date" class="form-control">
                </div>

            </div>

            <!-- BUTTON -->
            <button class="btn btn-primary w-100">Create Election</button>

        </form>

    </div>

</div>

{% endblock %}

<!DOCTYPE html>
<html>
<head>
    <title>Online Voting System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
body {
    margin: 0;
}

/* HERO BACKGROUND */
.hero-section {
    height: 90vh;
    background: url('https://images.unsplash.com/photo-1551836022-d5d88e9218df') no-repeat center center/cover;
    position: relative;
}

/* DARK OVERLAY */
.overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
}

/* CONTENT ABOVE OVERLAY */
.content {
    position: relative;
    z-index: 2;
}

/* 🔥 ANIMATIONS */
.fade-in {
    opacity: 0;
    animation: fadeIn 1s ease-in forwards;
}

.delay-1 { animation-delay: 0.5s; }
.delay-2 { animation-delay: 1s; }
.delay-3 { animation-delay: 1.5s; }

@keyframes fadeIn {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* BUTTON HOVER */
.btn:hover {
    transform: scale(1.05);
    transition: 0.3s;
}

/* FOOTER */
footer {
    background: #212529;
    color: white;
    padding: 20px;
    margin-top: 50px;
    text-align: center;
}





/* LOGIN BACKGROUND */
.login-container {
    height: 90vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #1d3557, #457b9d);
}

/* CARD */
.login-card {
    background: white;
    padding: 40px;
    border-radius: 15px;
    width: 350px;
    box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
    animation: fadeIn 0.8s ease-in-out;
}

/* INPUT FOCUS */
.form-control:focus {
    box-shadow: 0 0 5px #457b9d;
    border-color: #457b9d;
}



/* DASHBOARD LAYOUT */
.dashboard {
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    height: 100vh;
    background: #1d3557;
    padding: 20px;
    position: fixed;
}

.sidebar a {
    display: block;
    color: white;
    padding: 12px;
    margin-bottom: 10px;
    text-decoration: none;
    border-radius: 5px;
    transition: 0.3s;
}

.sidebar a:hover {
    background: #457b9d;
}

/* MAIN CONTENT */
.main-content {
    margin-left: 240px;
    padding: 30px;
    width: 100%;
}

/* CARDS */
.dashboard-card {
    padding: 20px;
    border-radius: 10px;
    text-align: center;
    background: #f1f5f9;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.dashboard-card:hover {
    transform: translateY(-5px);
}











</style>













</head>

<body>

<!-- 🔝 NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container">

        <a class="navbar-brand" href="/">🗳️ Voting System</a>

        <div class="collapse navbar-collapse">

            <ul class="navbar-nav me-auto">
                <a class="nav-link" href="{% url 'home' %}">Home</a>
<a class="nav-link" href="{% url 'about' %}">About</a>
<a class="nav-link" href="{% url 'contact' %}">Contact</a>
            </ul>

            <ul class="navbar-nav">
                {% if user.is_authenticated %}
                    <li class="nav-item">
                        <span class="nav-link">Hi, {{ user.username }}</span>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link btn btn-danger text-white px-3 ms-2" href="{% url 'logout' %}">
                            Logout
                        </a>
                    </li>
                {% else %}
                    <li class="nav-item">
                        <a class="nav-link btn btn-primary text-white px-3" href="{% url 'login' %}">
                            Login
                        </a>
                    </li>
                {% endif %}
            </ul>

        </div>
    </div>
</nav>


<!-- 🔽 CONTENT -->
{% block content %}
{% endblock %}


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<footer>
    <p>© 2026 Online Voting System | All Rights Reserved</p>
</footer>
</body>
</html>
